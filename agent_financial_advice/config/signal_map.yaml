# Signal Map: macro signal → ETF category score adjustments
# Scores are additive. Positive = increase weight, Negative = decrease weight.
# Each signal type maps to a list of {category, score} pairs.

signals:

  equities_positive:
    - category: global_equity
      score: +2
    - category: us_equity
      score: +2
    - category: europe_equity
      score: +1
