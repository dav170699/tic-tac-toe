<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.6s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { transform: scale(1); }
      to   { transform: scale(1.08); }
    }

    #scoreboard {
      display: flex;
      gap: 2rem;
      margin: 1.5rem 0;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border-radius: 10px;
      padding: 0.6rem 1.2rem;
    }

    .score-box .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .score-box .value { font-size: 1.8rem; font-weight: bold; }
    .score-box.x .value { color: #e94560; }
    .score-box.o .value { color: #a8dadc; }
    .score-box.draw .value { color: #f5c518; }

    #restart {
      margin-top: 0.5rem;
      padding: 0.7rem 2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #restart:hover { background: #c73652; transform: scale(1.04); }

    #mode-toggle {
      margin-bottom: 1.2rem;
      display: flex;
      background: #16213e;
      border-radius: 8px;
      overflow: hidden;
    }

    #mode-toggle button {
      padding: 0.5rem 1.2rem;
      border: none;
      background: transparent;
      color: #888;
      cursor: pointer;
      font-size: 0.95rem;
      transition: background 0.2s, color 0.2s;
    }

    #mode-toggle button.active {
      background: #0f3460;
      color: #eee;
    }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div id="mode-toggle">
    <button id="btn-pvp" class="active" onclick="setMode('pvp')">2 Players</button>
    <button id="btn-ai"  onclick="setMode('ai')">vs CPU</button>
  </div>

  <div id="status">X's turn</div>

  <div id="board"></div>

  <div id="scoreboard">
    <div class="score-box x">
      <div class="label">X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw">
      <div class="label">Draw</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <button id="restart" onclick="resetGame()">New Game</button>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board, current, gameOver, mode, scores;

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    scores = { X: 0, O: 0, draw: 0 };
    mode = 'pvp';
    renderBoard();
    updateStatus();
    updateScoreboard();
  }

  function setMode(m) {
    mode = m;
    document.getElementById('btn-pvp').classList.toggle('active', m === 'pvp');
    document.getElementById('btn-ai').classList.toggle('active',  m === 'ai');
    resetGame();
  }

  function renderBoard() {
    const el = document.getElementById('board');
    el.innerHTML = '';
    board.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = 'cell' + (val ? ' taken ' + val.toLowerCase() : '');
      cell.textContent = val;
      cell.onclick = () => handleClick(i);
      el.appendChild(cell);
    });
  }

  function handleClick(i) {
    if (gameOver || board[i]) return;
    if (mode === 'ai' && current === 'O') return;
    makeMove(i);
    if (mode === 'ai' && !gameOver) {
      setTimeout(aiMove, 350);
    }
  }

  function makeMove(i) {
    board[i] = current;
    const win = checkWin();
    renderBoard();
    if (win) {
      highlightWin(win);
      scores[current]++;
      updateScoreboard();
      document.getElementById('status').textContent = `${current} wins!`;
      gameOver = true;
    } else if (board.every(c => c)) {
      scores.draw++;
      updateScoreboard();
      document.getElementById('status').textContent = "It's a draw!";
      gameOver = true;
    } else {
      current = current === 'X' ? 'O' : 'X';
      updateStatus();
    }
  }

  function updateStatus() {
    const who = (mode === 'ai' && current === 'O') ? "CPU's turn" : `${current}'s turn`;
    document.getElementById('status').textContent = who;
  }

  function checkWin() {
    return WINS.find(([a,b,c]) => board[a] && board[a] === board[b] && board[a] === board[c]) || null;
  }

  function highlightWin(combo) {
    const cells = document.querySelectorAll('.cell');
    combo.forEach(i => cells[i].classList.add('win'));
  }

  function updateScoreboard() {
    document.getElementById('score-x').textContent    = scores.X;
    document.getElementById('score-o').textContent    = scores.O;
    document.getElementById('score-draw').textContent = scores.draw;
  }

  function resetGame() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    renderBoard();
    updateStatus();
  }

  // Minimax AI
  function aiMove() {
    const idx = bestMove();
    makeMove(idx);
  }

  function bestMove() {
    let best = -Infinity, move = -1;
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        board[i] = 'O';
        const score = minimax(board, 0, false);
        board[i] = '';
        if (score > best) { best = score; move = i; }
      }
    }
    return move;
  }

  function minimax(b, depth, isMax) {
    const win = WINS.find(([a,bc,c]) => b[a] && b[a] === b[bc] && b[a] === b[c]);
    if (win) return b[win[0]] === 'O' ? 10 - depth : depth - 10;
    if (b.every(c => c)) return 0;

    if (isMax) {
      let best = -Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i] = 'O'; best = Math.max(best, minimax(b, depth+1, false)); b[i] = ''; }
      }
      return best;
    } else {
      let best = Infinity;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) { b[i] = 'X'; best = Math.min(best, minimax(b, depth+1, true)); b[i] = ''; }
      }
      return best;
    }
  }

  init();
</script>
</body>
</html>
